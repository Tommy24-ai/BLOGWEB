<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #e2e8f0; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15,15,19,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 18px 48px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn {
            color: #94a3b8; text-decoration: none; font-size: 0.88rem; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .back-btn:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }

        .hero-img {
            width: 100%; height: 460px; overflow: hidden;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .hero-img img { width: 100%; height: 100%; object-fit: cover; }
        .hero-img .placeholder { font-size: 80px; }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(15,15,19,0.85) 0%, transparent 60%);
        }

        .article-wrap { max-width: 780px; margin: 0 auto; padding: 0 24px 80px; }

        .article-meta {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-top: -32px; position: relative; z-index: 2; padding-bottom: 28px;
        }
        .badge {
            background: rgba(139,92,246,0.2); color: #a78bfa;
            padding: 5px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
            border: 1px solid rgba(139,92,246,0.3);
        }
        .author-chip {
            background: rgba(255,255,255,0.06); color: #cbd5e1;
            padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
        }

        h1.title {
            font-family: 'Merriweather', serif;
            font-size: 2.4rem; font-weight: 700; line-height: 1.3;
            color: #f8fafc; margin-bottom: 32px;
        }

        .divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 32px; }

        .content {
            font-family: 'Merriweather', serif;
            font-size: 1.05rem; line-height: 1.95; color: #94a3b8;
            white-space: pre-wrap;
        }

        .gallery-section { margin-top: 48px; }
        .gallery-section h3 {
            font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: #475569; margin-bottom: 16px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .gallery-grid img {
            width: 100%; aspect-ratio: 4/3; object-fit: cover;
            border-radius: 10px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.2s, border-color 0.2s;
        }
        .gallery-grid img:hover { transform: scale(1.03); border-color: rgba(139,92,246,0.5); }

        .actions {
            display: flex; gap: 12px; margin-top: 48px;
            padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.07);
        }
        .btn-edit {
            padding: 12px 28px;
            background: rgba(14,165,233,0.12); color: #38bdf8;
            border: 1px solid rgba(14,165,233,0.2);
            border-radius: 10px; font-size: 0.9rem; font-weight: 600;
            text-decoration: none; transition: background 0.2s;
        }
        .btn-edit:hover { background: rgba(14,165,233,0.2); }
        .btn-delete {
            padding: 12px 28px;
            background: rgba(239,68,68,0.1); color: #f87171;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-delete:hover { background: rgba(239,68,68,0.2); }

        .lightbox {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .lightbox-close {
            position: absolute; top: 20px; right: 28px;
            color: white; font-size: 2rem; cursor: pointer; opacity: 0.7; line-height: 1;
        }
        .lightbox-close:hover { opacity: 1; }
        .lightbox-prev, .lightbox-next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: white; border: none;
            font-size: 1.8rem; padding: 12px 18px; cursor: pointer; border-radius: 10px;
            transition: background 0.2s;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.2); }

        .loading { text-align: center; padding: 120px 24px; color: #475569; }
    </style>
</head>
<body>

<header>
    <div class="logo">✦ BlogSpace</div>
    <a href="/" class="back-btn">← Back to Posts</a>
</header>

<div id="content">
    <div class="loading">Loading…</div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
    <span class="lightbox-close" onclick="closeLightbox()">✕</span>
    <button class="lightbox-prev" onclick="changeImage(-1)">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-next" onclick="changeImage(1)">›</button>
</div>

<script>
let images = [];
let current = 0;

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadBlog() {
    const id = location.pathname.split('/').pop();
    const res = await fetch(`/api/blogs/${id}`);
    if (!res.ok) {
        document.getElementById('content').innerHTML = '<div class="loading">Post not found.</div>';
        return;
    }
    const blog = await res.json();
    images = blog.images || [];
    document.title = blog.title;

    const heroHtml = images.length
        ? `<div class="hero-img"><img src="/api/image/${images[0]}" alt="${escHtml(blog.title)}"><div class="hero-overlay"></div></div>`
        : `<div class="hero-img"><div class="placeholder">📝</div><div class="hero-overlay"></div></div>`;

    const photoCountHtml = images.length
        ? `<span class="author-chip">🖼 ${images.length} photo${images.length > 1 ? 's' : ''}</span>` : '';

    const galleryHtml = images.length > 1 ? `
        <div class="gallery-section">
            <h3>📸 Photos (${images.length})</h3>
            <div class="gallery-grid">
                ${images.map((k, i) => `<img src="/api/image/${k}" alt="photo ${i+1}" onclick="openLightbox(${i})">`).join('')}
            </div>
        </div>` : '';

    document.getElementById('content').innerHTML = `
        ${heroHtml}
        <div class="article-wrap">
            <div class="article-meta">
                <span class="badge">${escHtml(blog.category)}</span>
                <span class="author-chip">✍️ ${escHtml(blog.author)}</span>
                ${photoCountHtml}
            </div>
            <h1 class="title">${escHtml(blog.title)}</h1>
            <div class="divider"></div>
            <div class="content">${escHtml(blog.content)}</div>
            ${galleryHtml}
            <div class="actions">
                <a href="/update/${blog.id}" class="btn-edit">✏️ Edit Post</a>
                <button class="btn-delete" onclick="deleteBlog(${blog.id})">🗑️ Delete</button>
            </div>
        </div>`;
}

async function deleteBlog(id) {
    if (!confirm('Delete this blog?')) return;
    await fetch(`/api/blogs/${id}`, { method: 'DELETE' });
    window.location.href = '/';
}

function openLightbox(index) {
    current = index;
    document.getElementById('lightbox-img').src = '/api/image/' + images[current];
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}
function closeLightboxOutside(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
}
function changeImage(dir) {
    current = (current + dir + images.length) % images.length;
    document.getElementById('lightbox-img').src = '/api/image/' + images[current];
}
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') changeImage(1);
    if (e.key === 'ArrowLeft') changeImage(-1);
});

loadBlog();
</script>
</body>
</html>
